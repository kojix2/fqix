title: fqix
description: FASTQ read-name index for ordinary .fastq.gz files
github_username: kojix2
markdown: kramdown
theme: minima
plugins:
  - jekyll-optional-front-matter
  - jekyll-titles-from-headings
optional_front_matter:
  remove_originals: true
titles_from_headings:
  enabled: true
  strip_title: true
  collections: false
